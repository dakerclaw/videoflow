<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传视频 - Videoflow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo">V</div>
      <span>Videoflow</span>
    </a>
    <div class="navbar-links">
      <button class="btn btn-outline btn-sm" onclick="window.location.href='/'">返回首页</button>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 2rem;">📤 上传视频</h1>

    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <p style="font-size: 1.1rem; margin-bottom: 0.5rem;">点击或拖拽视频到此处</p>
      <p style="color: var(--text-muted); font-size: 0.9rem;">支持 MP4, AVI, MOV, WMV, FLV, MKV, WEBM 格式</p>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">支持同时上传多个视频</p>
      <input type="file" id="fileInput" multiple accept="video/*" style="display: none;">
    </div>

    <!-- 已选文件列表 -->
    <div id="fileList" style="display: none; margin-bottom: 2rem;">
      <h3 style="margin-bottom: 1rem;">已选择 <span id="fileCount">0</span> 个文件</h3>
      <div id="fileItems"></div>
    </div>

    <!-- 缩略图预览 -->
    <div id="thumbnailPreview" style="display: none; margin-bottom: 2rem;">
      <h3 style="margin-bottom: 1rem;">缩略图预览</h3>
      <div id="thumbnailList" style="display: flex; gap: 1rem; flex-wrap: wrap;"></div>
    </div>

    <!-- 视频信息表单 -->
    <div id="uploadForm" style="display: none;">
      <div class="form-group">
        <label class="form-label">标题 <span style="color: var(--text-muted);">(选填)</span></label>
        <input type="text" class="form-input" id="videoTitle" placeholder="留空则使用文件名作为标题">
        <div class="form-hint">多个视频上传时，将在标题后自动添加序号</div>
      </div>
      <div class="form-group">
        <label class="form-label">标签 <span style="color: var(--text-muted);">(选填，逗号分隔)</span></label>
        <input type="text" class="form-input" id="videoTags" placeholder="例如：旅行,风景,生活">
      </div>
      <div class="form-group">
        <label class="form-label">描述 <span style="color: var(--text-muted);">(选填)</span></label>
        <textarea class="form-input" id="videoDescription" rows="4" placeholder="描述一下这个视频..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">视频密码 <span style="color: var(--text-muted);">(选填，设置后需要密码才能观看)</span></label>
        <input type="password" class="form-input" id="videoPassword" placeholder="留空则表示无需密码">
        <div class="form-hint">设置密码后，观众需要输入密码才能观看视频</div>
      </div>

      <div class="upload-progress" id="progressArea" style="display: none;">
        <div style="margin-bottom: 0.5rem;">
          <span id="progressText">上传中...</span>
          <span id="progressPercent" style="float: right;">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
      </div>

      <button class="btn btn-primary btn-lg" id="uploadBtn" onclick="startUpload()">开始上传</button>
    </div>
  </div>

  <script>
    let selectedFiles = [];
    let videoThumbnails = []; // 存储视频缩略图（blob 对象）
    let videoDurations = []; // 存储视频时长（秒）
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    // 点击上传区域
    uploadArea.addEventListener('click', () => fileInput.click());

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    async function handleFiles(files) {
      if (files.length === 0) return;

      selectedFiles = Array.from(files);
      videoThumbnails = []; // 清空旧缩略图

      // 为每个视频生成缩略图
      await generateThumbnails();

      showFileList();
      document.getElementById('uploadForm').style.display = 'block';
    }

    // 生成视频缩略图（浏览器端）
    async function generateThumbnails() {
      videoDurations = []; // 清空旧时长
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        try {
          const result = await extractVideoFrame(file);
          videoThumbnails.push(result.thumbnail);
          videoDurations.push(result.duration || 0);
        } catch (e) {
          console.error(`视频 ${i+1} 缩略图生成失败，使用默认缩略图:`, e);
          videoDurations.push(0); // 未知时长
          // 加载默认缩略图作为 fallback
          try {
            const response = await fetch('/default-thumbnail.jpg');
            const blob = await response.blob();
            videoThumbnails.push(blob);
          } catch (e2) {
            console.error('默认缩略图加载失败:', e2);
            videoThumbnails.push(null); // 后端会使用默认缩略图
          }
        }
      }
      
      // 显示缩略图预览
      showThumbnailPreview();
    }

    // 从视频提取第一帧（修复版 - 兼容所有浏览器）
    function extractVideoFrame(file) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // 关键：临时添加到 DOM 以确保视频加载（兼容所有浏览器）
        video.style.display = 'none';
        document.body.appendChild(video);

        video.preload = 'metadata';
        video.muted = true;
        video.playsInline = true;

        const videoUrl = URL.createObjectURL(file);
        video.src = videoUrl;

        // 设置超时（防止视频加载卡住）
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('视频加载超时'));
        }, 10000); // 10秒超时

        function cleanup() {
          clearTimeout(timeout);
          if (video.parentNode) {
            document.body.removeChild(video);
          }
          URL.revokeObjectURL(videoUrl);
        }

        let videoDuration = 0; // 存储视频时长

        video.onloadedmetadata = () => {
          // 捕获视频时长（秒）
          videoDuration = Math.round(video.duration);

          // 根据视频实际比例设置 canvas 尺寸（保持原始比例）
          const videoRatio = video.videoWidth / video.videoHeight;

          // 固定宽度为 320，根据视频比例计算高度
          canvas.width = 320;
          canvas.height = Math.round(320 / videoRatio);

          // 限制最大高度为 320（防止超宽视频的缩略图过高）
          if (canvas.height > 320) {
            canvas.height = 320;
            canvas.width = Math.round(320 * videoRatio);
          }

          // 跳到第1秒或视频中间（取较小的）
          video.currentTime = Math.min(1, video.duration / 2);
        };

        video.onseeked = () => {
          try {
            // 绘制视频帧到 canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 转换为 JPEG blob
            canvas.toBlob((blob) => {
              cleanup();

              if (blob) {
                resolve({ thumbnail: blob, duration: videoDuration });
              } else {
                reject(new Error('Canvas 转 Blob 失败'));
              }
            }, 'image/jpeg', 0.85); // 质量 0.85
          } catch (e) {
            cleanup();
            reject(e);
          }
        };

        video.onerror = (e) => {
          cleanup();
          reject(new Error('视频加载失败，无法生成缩略图'));
        };
      });
    }

    // 显示缩略图预览
    function showThumbnailPreview() {
      const previewDiv = document.getElementById('thumbnailPreview');
      const listDiv = document.getElementById('thumbnailList');

      if (videoThumbnails.length === 0) return;

      previewDiv.style.display = 'block';
      
      // 清空现有内容
      listDiv.innerHTML = '';
      
      // 为每个缩略图创建预览
      videoThumbnails.forEach((thumb, index) => {
        const container = document.createElement('div');
        container.style.cssText = 'text-align:center; display:inline-block; margin:0.5rem;';
        
        if (thumb) {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(thumb);
          img.style.cssText = 'border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.3); max-width:200px;';
          img.onload = function() {
            // 根据图片实际比例设置容器高度
            const ratio = this.naturalWidth / this.naturalHeight;
            this.style.width = '160px';
            this.style.height = Math.round(160 / ratio) + 'px';
            this.style.objectFit = 'contain';
          };
          container.appendChild(img);
        } else {
          const placeholder = document.createElement('div');
          placeholder.style.cssText = 'width:160px; height:90px; background:var(--bg-card); border-radius:8px; display:flex; align-items:center; justify-content:center;';
          placeholder.innerHTML = '<span style="font-size:2rem;">🎬</span>';
          container.appendChild(placeholder);
        }
        
        const label = document.createElement('div');
        label.style.cssText = 'margin-top:0.3rem; font-size:0.8rem; color:var(--text-muted);';
        label.textContent = `视频 ${index + 1}`;
        container.appendChild(label);
        
        listDiv.appendChild(container);
      });
    }

    function showFileList() {
      document.getElementById('fileList').style.display = 'block';
      document.getElementById('fileCount').textContent = selectedFiles.length;

      const fileItems = document.getElementById('fileItems');
      fileItems.innerHTML = selectedFiles.map((file, index) => `
        <div style="display: flex; align-items: center; gap: 1rem; padding: 0.8rem; background: var(--bg-card); border-radius: 8px; margin-bottom: 0.5rem;">
          <span style="color: var(--primary); font-weight: 500;">${index + 1}</span>
          <span style="flex: 1;">${file.name}</span>
          <span style="color: var(--text-muted); font-size: 0.85rem;">${formatFileSize(file.size)}</span>
          <button onclick="removeFile(${index})" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem;">×</button>
        </div>
      `).join('');
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      if (selectedFiles.length === 0) {
        document.getElementById('fileList').style.display = 'none';
        document.getElementById('uploadForm').style.display = 'none';
      } else {
        showFileList();
      }
    }

    async function startUpload() {
      const title = document.getElementById('videoTitle').value.trim();

      const formData = new FormData();
      selectedFiles.forEach((file, index) => {
        formData.append('videos', file);
        
        // 单独发送文件名（确保中文文件名编码正确）
        formData.append(`filename_${index}`, file.name);

        // 发送视频时长（秒）
        formData.append(`duration_${index}`, Math.round(videoDurations[index] || 0));

        // 添加对应的缩略图（按索引匹配）
        if (videoThumbnails[index]) {
          // 将 blob 转换为 File 对象
          const thumbFile = new File([videoThumbnails[index]], `thumb_${index}.jpg`, { type: 'image/jpeg' });
          formData.append(`thumbnail_${index}`, thumbFile);
        }
      });
      formData.append('title', title);
      formData.append('tags', document.getElementById('videoTags').value.trim());
      formData.append('description', document.getElementById('videoDescription').value.trim());
      formData.append('password', document.getElementById('videoPassword').value);

      const token = localStorage.getItem('token');
      if (!token) {
        showToast('请先登录', 'error');
        setTimeout(() => window.location.href = '/login.html', 1000);
        return;
      }

      // 显示进度
      document.getElementById('progressArea').style.display = 'block';
      document.getElementById('uploadBtn').disabled = true;

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/videos/upload');

        xhr.setRequestHeader('Authorization', `Bearer ${token}`);

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            showToast(`成功上传 ${data.videos.length} 个视频`, 'success');
            setTimeout(() => {
              window.location.href = '/';
            }, 1000);
          } else {
            const error = JSON.parse(xhr.responseText);
            showToast(error.error || '上传失败', 'error');
            document.getElementById('uploadBtn').disabled = false;
          }
        });

        xhr.addEventListener('error', () => {
          showToast('上传失败，请重试', 'error');
          document.getElementById('uploadBtn').disabled = false;
        });

        xhr.send(formData);
      } catch (e) {
        showToast('上传失败', 'error');
        document.getElementById('uploadBtn').disabled = false;
      }
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // 检查登录状态
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (!token) {
        showToast('请先登录', 'error');
        setTimeout(() => window.location.href = '/login.html', 1000);
      }
    });
  </script>
</body>
</html>
